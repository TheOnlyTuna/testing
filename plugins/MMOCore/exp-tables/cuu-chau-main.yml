cuu_chau_main:
  every_level_attr:
    period: 1
    triggers:
      - 'command{format="mmocore admin attribute-points add %player_name% 2"}'

  every_5_levels_skill:
    period: 5
    triggers:
      - 'command{format="mmocore admin skill-points add %player_name% 1"}'

  slot_2_unlock:
    period: 1
    first-trigger: 10
    last-trigger: 10
    triggers:
      - 'command{format="mmocore admin slot unlock %player_name% 2"}'

  slot_3_unlock:
    period: 1
    first-trigger: 20
    last-trigger: 20
    triggers:
      - 'command{format="mmocore admin slot unlock %player_name% 3"}'
